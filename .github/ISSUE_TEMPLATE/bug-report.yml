name: Bug report
description: Report a broken behavior, regression, or defect that should be tracked and fixed.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Use this form when something is broken, regressed, or behaves differently than expected.
        Be concrete, reproducible, and evidence-based.

  - type: input
    id: repository
    attributes:
      label: Affected repository
      description: Which repository or area is affected?
      placeholder: e.g. OpenSIN-backend, dev-setup, website-my.opensin.ai
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How hard does this bug hit?
      options:
        - Critical - blocks core flow or breaks production behavior
        - High - major impact, workaround is poor or missing
        - Medium - meaningful bug, but work can continue
        - Low - edge case, polish issue, or low-risk defect
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken in one clear paragraph?
      placeholder: Describe the bug, the affected flow, and why it matters.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the shortest reliable reproduction path.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Submit ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happens now?
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add logs, screenshots, traces, links, error messages, or other proof.
      placeholder: Paste relevant evidence here.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Definition of done
      description: How will we know this bug is actually fixed?
      placeholder: |
        - Root cause identified
        - Reproduction no longer fails
        - Related path is verified
        - Docs/tests updated if needed
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I checked that this is a concrete bug report and not a general question or discussion topic.
          required: true
        - label: I included enough detail for someone else to reproduce or investigate this issue.
          required: true

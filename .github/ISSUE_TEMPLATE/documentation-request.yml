name: Documentation request
description: Request new documentation or improve outdated, unclear, or missing docs.
title: "[Docs]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this form for missing guides, confusing docs, outdated setup instructions, or structure problems in documentation.

  - type: input
    id: repository
    attributes:
      label: Target repository or documentation area
      placeholder: e.g. dev-setup, documentation, OpenSIN-Code
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Documentation problem
      description: What is missing, outdated, misleading, or hard to understand?
      placeholder: Describe the current documentation gap clearly.
    validations:
      required: true

  - type: textarea
    id: audience
    attributes:
      label: Intended audience
      description: Who needs this documentation?
      placeholder: e.g. new contributors, internal team members, operators, end users
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected outcome
      description: What should exist after this is done?
      placeholder: e.g. new guide, updated section, better examples, clarified workflow
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Add relevant files, links, screenshots, old docs, or related issues.
      placeholder: Paste anything helpful here.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Definition of done
      placeholder: |
        - Correct file or guide updated
        - Content is accurate and understandable
        - Navigation or links updated if needed
        - Audience can actually use it
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I checked that this belongs in documentation work, not in a feature or bug issue.
          required: true
